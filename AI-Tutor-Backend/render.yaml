# =============================================================================
# Render Blueprint — AI-Tutor Backend
# https://docs.render.com/blueprints
#
# Free-tier only setup:
# - Web service plan: free
# - Key Value (Valkey/Redis-compatible) plan: free
# - No persistent disk (free web services cannot use paid persistent disk)
# =============================================================================

services:
  - type: keyvalue
    name: ai-tutor-kv-free
    region: singapore
    plan: free
    # Required for keyvalue in blueprints. Empty list means internal-only access.
    ipAllowList: []
    # Recommended for queues so writes fail instead of evicting pending jobs.
    maxmemoryPolicy: noeviction

  - type: web
    name: ai-tutor-backend-free
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      # --- Server (auto-configured by Dockerfile) ---
      - key: AI_TUTOR_API_HOST
        value: "0.0.0.0"
      - key: AI_TUTOR_API_PORT
        value: "10000"
      - key: AI_TUTOR_STORAGE_ROOT
        value: "/tmp/ai-tutor"
      - key: AI_TUTOR_LOG_FORMAT
        value: "json"
      - key: RUST_LOG
        value: "info"

      # --- Redis/Valkey internal connection from Render Key Value ---
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-tutor-kv-free
          property: connectionString

      # --- Public URL (Render assigns this) ---
      # Replace with your actual Render URL after first deploy
      - key: AI_TUTOR_BASE_URL
        value: "https://ai-tutor-backend-free.onrender.com"

      # --- CORS — your Vercel frontend URL ---
      - key: AI_TUTOR_ALLOWED_ORIGINS
        value: "https://ai-tutor.vercel.app"

      # --- Auth — protect the API ---
      - key: AI_TUTOR_API_SECRET
        sync: false  # Set manually in Render dashboard

      # --- LLM Provider (pick ONE) ---
      # Option A: OpenAI (supports LLM + TTS + ASR + Images)
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard

      # Option B: OpenRouter (LLM only — 200+ models)
      - key: OPENROUTER_API_KEY
        sync: false

      # Option C: Groq (LLM only — ultra-fast inference)
      - key: GROQ_API_KEY
        sync: false

      # --- Which model to use for lesson generation ---
      - key: AI_TUTOR_MODEL
        value: "openai:gpt-4o-mini"

      # --- Media models (all use OPENAI_API_KEY) ---
      - key: AI_TUTOR_IMAGE_MODEL
        value: "openai:gpt-image-1"
      - key: AI_TUTOR_TTS_MODEL
        value: "openai:tts-1"
      - key: AI_TUTOR_ASR_MODEL
        value: "openai:whisper-1"
