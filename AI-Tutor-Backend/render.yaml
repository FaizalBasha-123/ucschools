# =============================================================================
# Render Blueprint — AI-Tutor Backend
# https://docs.render.com/blueprints
#
# Free-tier only setup:
# - Web service plan: free
# - Key Value (Valkey/Redis-compatible) plan: free
# - No persistent disk (free web services cannot use paid persistent disk)
# =============================================================================

services:
  - type: keyvalue
    name: ai-tutor-kv-free
    region: singapore
    plan: free
    # Required for keyvalue in blueprints. Empty list means internal-only access.
    ipAllowList: []
    # Recommended for queues so writes fail instead of evicting pending jobs.
    maxmemoryPolicy: noeviction

  - type: web
    name: ai-tutor-backend-free
    runtime: docker
    region: singapore
    plan: free
    rootDir: AI-Tutor-Backend
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    healthCheckPath: /api/health
    envVars:
      # --- Server (auto-configured by Dockerfile) ---
      - key: AI_TUTOR_API_HOST
        value: "0.0.0.0"
      - key: AI_TUTOR_API_PORT
        value: "10000"
      - key: AI_TUTOR_STORAGE_ROOT
        value: "/tmp/ai-tutor"
      - key: AI_TUTOR_LESSON_DB_PATH
        value: "/tmp/ai-tutor/runtime/lessons.db"
      - key: AI_TUTOR_RUNTIME_DB_PATH
        value: "/tmp/ai-tutor/runtime/runtime-sessions.db"
      - key: AI_TUTOR_JOB_DB_PATH
        value: "/tmp/ai-tutor/runtime/lesson-jobs.db"
      - key: AI_TUTOR_QUEUE_DB_PATH
        value: "/tmp/ai-tutor/runtime/lesson-queue.db"
      - key: AI_TUTOR_ASSET_TTL_HOURS
        value: "24"
      - key: AI_TUTOR_JOB_TTL_HOURS
        value: "24"
      - key: AI_TUTOR_LESSON_TTL_HOURS
        value: "168"
      - key: AI_TUTOR_CLEANUP_INTERVAL_MINUTES
        value: "60"
      - key: AI_TUTOR_LOG_FORMAT
        value: "json"
      - key: RUST_LOG
        value: "info"

      # --- Redis/Valkey internal connection from Render Key Value ---
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: ai-tutor-kv-free
          property: connectionString

      # --- Public URL (Render assigns this) ---
      # Replace with your actual Render URL after first deploy
      - key: AI_TUTOR_BASE_URL
        value: "https://ai-tutor-backend-free.onrender.com"

      # --- CORS — your Vercel frontend URL ---
      - key: AI_TUTOR_ALLOWED_ORIGINS
        value: "https://uc-aitutor.vercel.app"

      # --- Auth — protect the API ---
      - key: AI_TUTOR_API_SECRET
        sync: false  # Set manually in Render dashboard
      - key: AI_TUTOR_PARTIAL_AUTH_SECRET
        sync: false
      - key: AI_TUTOR_SESSION_JWT_SECRET
        sync: false

      # --- LLM Providers ---
      # OpenRouter powers chat/generation.
      - key: OPENROUTER_API_KEY
        sync: false
      - key: AI_TUTOR_LLM_CIRCUIT_BREAKER_THRESHOLD
        value: "2"
      - key: AI_TUTOR_LLM_CIRCUIT_BREAKER_COOLDOWN_MS
        value: "30000"

      # --- Which model to use for lesson generation ---
      - key: BALANCED_MODE_AI_TUTOR_MODEL
        value: "openrouter:openai/gpt-4o-mini"
      - key: BALANCED_MODE_AI_TUTOR_CHAT_BASELINE_MODEL
        value: "openrouter:openai/gpt-4o-mini"
      - key: BALANCED_MODE_AI_TUTOR_CHAT_SCAFFOLD_MODEL
        value: "openrouter:google/gemini-2.5-flash"
      - key: BALANCED_MODE_AI_TUTOR_CHAT_REASONING_MODEL
        value: "openrouter:anthropic/claude-sonnet-4-6"
      - key: BALANCED_MODE_AI_TUTOR_GENERATION_OUTLINES_MODEL
        value: "openrouter:google/gemini-2.5-flash"
      - key: BALANCED_MODE_AI_TUTOR_GENERATION_SCENE_CONTENT_MODEL
        value: "openrouter:openai/gpt-4o-mini"
      - key: BALANCED_MODE_AI_TUTOR_GENERATION_SCENE_ACTIONS_MODEL
        value: "openrouter:openai/gpt-4o-mini"
      - key: BALANCED_MODE_AI_TUTOR_PBL_RUNTIME_MODEL
        value: "openrouter:openai/gpt-4o-mini"
      - key: BALANCED_MODE_AI_TUTOR_PDF_MODEL
        value: "openrouter:google/gemini-2.0-flash-001"

      # --- Media models (still use OPENAI_API_KEY) ---
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: BALANCED_MODE_AI_TUTOR_IMAGE_MODEL
        value: "openai:gpt-image-1"
      - key: BALANCED_MODE_AI_TUTOR_TTS_MODEL
        value: "openai:tts-1"
      - key: BALANCED_MODE_AI_TUTOR_ASR_MODEL
        value: "openai:whisper-1"
